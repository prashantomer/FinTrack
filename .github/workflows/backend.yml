name: Backend

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: RSpec
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fintrack_db_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fintrack_db_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE || 'ci-test-secret-key-base-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx' }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.4"
          bundler-cache: true
          working-directory: backend

      - name: Set up database
        run: bundle exec rails db:schema:load

      - name: Run RSpec
        run: bundle exec rspec --format progress

  lint:
    name: RuboCop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.4"
          bundler-cache: true
          working-directory: backend

      - name: RuboCop
        run: bin/rubocop -f github

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.4"
          bundler-cache: true
          working-directory: backend

      - name: Brakeman
        run: bin/brakeman --no-pager --ignore-config config/brakeman.ignore

      - name: Bundler Audit
        run: bundle exec bundler-audit update && bundle exec bundler-audit check
